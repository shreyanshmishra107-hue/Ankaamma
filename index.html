<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BigFoot Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css"
crossorigin="anonymous">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"
crossorigin="anonymous"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:sans-serif;
}

#wrap{
    position:absolute;
    inset:0;
}

#video{
    width:100%;
    height:100%;
    background:#000;
}

.shaka-spinner-container{
    display:none!important;
}

/* ===== Loader ===== */

#loader{
    position:fixed;
    inset:0;
    background:#000;
    z-index:999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    transition:opacity .4s;
}

#loader.gone{
    opacity:0;
    pointer-events:none;
}

#ring{
    width:42px;
    height:42px;
    border:3px solid rgba(232,255,71,.12);
    border-top-color:#e8ff47;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg)
    }
}

#llbl{
    font-size:11px;
    font-weight:800;
    letter-spacing:.12em;
    color:rgba(255,255,255,.25);
}

/* ===== Watermark ===== */

#wm{
    position:fixed;
    top:12px;
    left:1px;
    z-index:900;
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(0,136,204,.18);
    backdrop-filter:blur(8px);
    border:1px solid rgba(0,136,204,.28);
    padding:6px 11px;
    border-radius:7px;
    color:#fff;
    font-size:12px;
    font-weight:700;
    text-decoration:none;
}

/* ===== Bottom Banner ===== */

#bottom-banner{
    position:fixed;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    z-index:900;
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.12);
    padding:10px 16px;
    border-radius:14px;
    color:#fff;
    font-size:13px;
    font-weight:700;
}

#bottom-banner strong{
    color:#fff;
}

#bottom-banner a{
    color:#00ccff;
    text-decoration:none;
    font-weight:800;
}

/* ===== Popup ===== */

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    backdrop-filter:blur(6px);
    background:rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeIn .5s ease;
}

.modal.hidden{
    display:none!important;
}

.modal-content{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px 25px;
    width:90%;
    max-width:400px;
    text-align:center;
    color:#f3f4f6;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter:blur(12px);
    transform:scale(.95);
    animation:scaleIn .4s ease forwards;
}

.modal-content h2{
    font-size:24px;
    font-weight:700;
    color:#facc15;
    margin-bottom:16px;
}

.modal-content p{
    font-size:16px;
    color:#d1d5db;
    margin-bottom:24px;
    line-height:1.5;
}

.modal-content strong{
    color:#fff;
}

.modal-content .btn{
    width:100%;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:12px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.3s;
}

#joinButton{
    background:linear-gradient(to right,#3b82f6,#06b6d4);
    color:#fff;
    font-weight:500;
}

#joinButton:hover{
    background:linear-gradient(to right,#2563eb,#0891b2);
    transform:scale(1.02);
}

#closeButton{
    background:rgba(255,255,255,0.1);
    color:#f3f4f6;
}

#closeButton:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.02);
}

@keyframes fadeIn{
    from{
        opacity:0
    }
    to{
        opacity:1
    }
}

@keyframes scaleIn{
    to{
        transform:scale(1);
        opacity:1
    }
}

</style>
</head>

<body>

<!-- Watermark -->

<a href="https://t.me/+l-BV45YWZoM3ZmE9"
target="_blank"
id="wm">

@Shrey7nsh FB

</a>

<!-- Bottom Banner -->

<div id="bottom-banner">

    Stay updated with latest
    <strong>Live Match Links</strong>

    <a href="https://t.me/+l-BV45YWZoM3ZmE9"
    target="_blank">

        Join Telegram

    </a>

</div>

<!-- Player -->

<div id="wrap" data-shaka-player-container>

    <video autoplay
    playsinline
    data-shaka-player
    id="video"></video>

</div>

<!-- Loader -->

<div id="loader">

    <div id="ring"></div>

    <div id="llbl">

        LOADING STREAM

    </div>

</div>

<!-- TELEGRAM POPUP -->

<div id="telegramModal" class="modal">

    <div class="modal-content">

        <h2>Join Our Telegram</h2>

        <p>
            Stay updated with the latest
            <strong>Live Match Links</strong>
            and updates. Click below to join our official Telegram channel.
        </p>

        <a href="https://t.me/+l-BV45YWZoM3ZmE9"
        target="_blank"
        style="text-decoration:none;">

            <button id="joinButton" class="btn">

                Join Telegram

            </button>

        </a>

        <button id="closeButton" class="btn">

            Maybe Later

        </button>

    </div>

</div>

<script>

document.addEventListener(
    'shaka-ui-loaded',
    initPlayer
);

async function initPlayer(){

    const video =
    document.getElementById('video');

    const player =
    video.ui.getControls().getPlayer();

    const params =
    new URLSearchParams(
        window.location.search
    );

    const streamId =
    params.get("id");

    const directUrl =
    params.get("url");

    try{

        let stream = directUrl;

        // ===== LOAD FROM ?id= =====

        if(streamId){

            const response = await fetch(
                "https://lchdxfootball.pages.dev/premium.js"
            );

            const jsText =
            await response.text();

            const objectText =
            jsText
            .replace("const streamMap =", "")
            .trim()
            .replace(/;$/, "");

            const data =
            eval("(" + objectText + ")");

            if(
                data[streamId] &&
                data[streamId].url
            ){

                stream =
                data[streamId].url;

                if(data[streamId].poster){

                    video.poster =
                    data[streamId].poster;
                }

            }else{

                document
                .getElementById("llbl")
                .textContent =
                "STREAM NOT FOUND";

                return;
            }
        }

        // ===== FALLBACK =====

        if(!stream){

            stream =
            "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
        }

        // ===== LOAD STREAM =====

        await player.load(stream);

        // ===== HIDE LOADER =====

        document
        .getElementById("loader")
        .classList.add("gone");

    }catch(e){

        console.error(e);

        document
        .getElementById("llbl")
        .textContent =
        "STREAM FAILED";

        document
        .getElementById("loader")
        .classList.add("gone");
    }
}

// ===== CLOSE POPUP =====

window.addEventListener(
    "DOMContentLoaded",
    function(){

        document
        .getElementById("closeButton")
        .onclick = function(){

            document
            .getElementById("telegramModal")
            .classList.add("hidden");
        };
    }
);

// ===== WAKE LOCK =====

if('wakeLock' in navigator){

    navigator
    .wakeLock
    .request('screen')
    .catch(()=>{});
}

</script>

</body>
</html>
