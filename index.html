
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VortexTV • Live Sports Streams</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #060a14;
      --bg-card: rgba(16, 22, 38, 0.65);
      --border-glow: rgba(59, 130, 246, 0.25);
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --accent-red: #ef4444;
      --accent-amber: #f59e0b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --glass: rgba(255,255,255,0.03);
      --radius-card: 20px;
      --radius-btn: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg-deep);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(59,130,246,0.1) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(139,92,246,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 50% 60% at 50% 80%, rgba(6,182,212,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 1.2rem 1rem 5rem;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
      gap: 0.8rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .logo-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 6px 24px rgba(59,130,246,0.4);
      flex-shrink: 0;
    }
    .logo-text {
      font-weight: 800;
      font-size: 1.7rem;
      background: linear-gradient(to right, #fff, #bae6fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.6px;
    }
    .live-pulse {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      border: 1px solid rgba(239,68,68,0.3);
      letter-spacing: 0.5px;
    }
    .live-pulse::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent-red);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Stats ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .stat-item {
      text-align: center;
      padding: 0.7rem 0.5rem;
      background: var(--glass);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--accent-blue), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .stat-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.15rem;
    }

    /* ── Search ── */
    .search-bar {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar:focus-within {
      border-color: rgba(59,130,246,0.4);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .search-bar input {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 0.92rem;
      font-family: inherit;
      width: 100%;
      outline: none;
      padding-left: 0.5rem;
    }
    .search-bar input::placeholder { color: var(--text-muted); }

    /* ── Category bar ── */
    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      background: rgba(255,255,255,0.02);
      padding: 0.5rem;
      border-radius: 50px;
      margin-bottom: 1.8rem;
      border: 1px solid rgba(255,255,255,0.05);
      justify-content: center;
    }
    .cat-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.6rem 1.3rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      font-family: inherit;
    }
    .cat-btn.active {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      box-shadow: 0 4px 16px rgba(59,130,246,0.4);
    }
    .cat-btn:not(.active):hover {
      background: rgba(59,130,246,0.12);
      color: #e2e8f0;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.2rem;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border-radius: var(--radius-card);
      padding: 1.2rem;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 16px 40px -8px rgba(0,0,0,0.5);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      will-change: transform;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border-glow);
      box-shadow: 0 24px 48px -8px rgba(0,0,0,0.6), 0 0 30px rgba(59,130,246,0.12);
    }
    @media (hover: none) {
      .card:active { transform: scale(0.98); }
      .card:hover { transform: none; box-shadow: 0 16px 40px -8px rgba(0,0,0,0.5); }
    }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-secondary);
    }
    .badge {
      padding: 0.22rem 0.75rem;
      border-radius: 30px;
      font-size: 0.65rem;
      font-weight: 800;
      margin-left: auto;
      letter-spacing: 0.5px;
    }
    .badge-live {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      animation: liveGlow 2s ease-in-out infinite alternate;
    }
    @keyframes liveGlow {
      from { box-shadow: 0 0 6px rgba(220,38,38,0.4); }
      to { box-shadow: 0 0 16px rgba(220,38,38,0.7); }
    }
    .badge-upcoming { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a; }
    .badge-ended { background: rgba(71,85,105,0.8); color: #94a3b8; }

    .teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0.3rem 0 1rem;
    }
    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }
    /* FIX: fixed dimensions on wrap prevent layout shift when image fails */
    .team-img-wrap {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .team-img-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 50%;
      /* Prevent flickering: don't let the browser show broken image icon */
      display: block;
    }
    /* Fallback emoji shown when image fails */
    .team-img-wrap .img-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      /* hidden by default; shown via JS on error */
      opacity: 0;
      transition: opacity 0.2s;
    }
    .team-img-wrap.img-error .img-fallback { opacity: 1; }
    .team-img-wrap.img-error img { opacity: 0; }

    .team-name {
      font-weight: 700;
      font-size: 0.88rem;
      text-align: center;
      color: var(--text-primary);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }
    .vs {
      font-weight: 900;
      font-size: 0.95rem;
      color: var(--text-muted);
      padding: 0 0.6rem;
      flex-shrink: 0;
    }

    .event-title {
      font-weight: 700;
      font-size: 1.05rem;
      color: white;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }
    .event-type {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 0.7rem;
    }

    .card-time-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
      font-size: 0.78rem;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 0.4rem 0.7rem;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .card-time-row .time-icon { font-size: 0.85rem; }
    .card-time-row .time-text { font-weight: 500; }
    .card-time-row .time-countdown {
      margin-left: auto;
      font-weight: 700;
      color: var(--accent-amber);
      font-size: 0.73rem;
    }
    .card-time-row.live-time .time-text { color: #fca5a5; }
    .card-time-row.live-time .time-icon { animation: pulse 2s infinite; display: inline-block; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 0.7rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      gap: 0.5rem;
    }
    .stream-count {
      background: rgba(30,41,59,0.8);
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #b9c7e0;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    /* Skeleton */
    .skeleton-card {
      background: rgba(16,22,38,0.65);
      border-radius: var(--radius-card);
      padding: 1.2rem;
      border: 1px solid rgba(255,255,255,0.04);
      height: 200px;
      animation: skeletonPulse 1.5s ease-in-out infinite;
    }
    @keyframes skeletonPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }

    /* ── Modal ── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      padding: 0;
      overscroll-behavior: none;
    }
    @media (min-width: 600px) {
      .modal { align-items: center; padding: 1rem; }
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(180deg, #0f172a 0%, #0a0f1e 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 1.5rem 1.2rem;
      box-shadow: 0 -20px 60px rgba(0,0,0,0.8);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.26, 0.64, 1);
      position: relative;
    }
    @media (min-width: 600px) {
      .modal-content {
        border-radius: 24px;
        max-width: 680px;
        max-height: 88vh;
        padding: 1.8rem;
        transform: translateY(30px) scale(0.97);
        box-shadow: 0 40px 80px rgba(0,0,0,0.9);
      }
    }
    .modal.active .modal-content {
      transform: translateY(0) scale(1);
    }
    .drag-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 1.2rem;
      display: block;
    }
    @media (min-width: 600px) { .drag-handle { display: none; } }
    .modal-content::-webkit-scrollbar { width: 5px; }
    .modal-content::-webkit-scrollbar-track { background: transparent; }
    .modal-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.4rem;
      gap: 1rem;
    }
    .modal-header h3 {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(to right, #fff, #bae6fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
    }
    .close-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-size: 1.3rem;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .close-btn:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.3); }

    /* ── Stream items ── */
    .stream-section-title {
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--text-muted);
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .stream-item {
      background: rgba(30,41,59,0.5);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.8rem;
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .stream-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-bottom: 0.9rem;
    }
    .stream-info { flex: 1; min-width: 160px; }
    .stream-title {
      font-weight: 700;
      color: #f8fafc;
      font-size: 0.93rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
    }
    .stream-type {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .drm-badge {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      padding: 0.12rem 0.45rem;
      border-radius: 5px;
      font-size: 0.67rem;
      font-weight: 700;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .free-badge {
      background: rgba(34,197,94,0.15);
      color: #86efac;
      padding: 0.12rem 0.45rem;
      border-radius: 5px;
      font-size: 0.67rem;
      font-weight: 700;
      border: 1px solid rgba(34,197,94,0.2);
    }
    .stream-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    .copy-btn, .ns-btn {
      border: none;
      color: white;
      padding: 0.55rem 1rem;
      border-radius: var(--radius-btn);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .copy-btn {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      box-shadow: 0 3px 12px rgba(59,130,246,0.3);
    }
    .copy-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
    .copy-btn:active { transform: scale(0.97); }
    .ns-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-secondary);
    }
    .ns-btn:hover { background: rgba(255,255,255,0.12); color: white; }
    .copy-btn.copied {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 3px 12px rgba(34,197,94,0.3);
    }

    .ns-data-panel {
      background: rgba(0,0,0,0.45);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.73rem;
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.2);
      word-break: break-all;
      line-height: 1.75;
    }
    .ns-data-panel .ns-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.15rem;
    }
    .ns-data-panel .ns-row:last-child { margin-bottom: 0; }
    .ns-label {
      color: #818cf8;
      font-weight: 700;
      min-width: 58px;
      flex-shrink: 0;
    }
    .ns-val {
      color: #c7d2fe;
      word-break: break-all;
    }

    .related-section {
      margin-top: 1.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .related-title {
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--text-muted);
      margin-bottom: 0.7rem;
    }
    .related-links { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .related-chip {
      background: rgba(30,41,59,0.6);
      padding: 0.45rem 0.9rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .related-chip:hover { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: white; }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 2rem;
      color: var(--text-secondary);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.8rem; opacity: 0.5; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.4rem; }
    .empty-state p { font-size: 0.88rem; }

    .toast {
      position: fixed;
      bottom: max(1.5rem, env(safe-area-inset-bottom, 1.5rem));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.87rem;
      box-shadow: 0 12px 32px rgba(59,130,246,0.4);
      z-index: 2000;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.35s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeInUp 0.4s ease both; }

    @media (max-width: 480px) {
      .logo-text { font-size: 1.4rem; }
      .stats-bar { gap: 0.4rem; }
      .stat-value { font-size: 1.2rem; }
      .grid { grid-template-columns: 1fr; gap: 1rem; }
      .stream-item-top { flex-direction: column; align-items: flex-start; }
      .stream-actions { width: 100%; }
      .copy-btn, .ns-btn { flex: 1; justify-content: center; }
    }
    @media (max-width: 360px) {
      .container { padding: 0.8rem 0.7rem 5rem; }
      .category-bar { gap: 0.3rem; padding: 0.4rem; }
      .cat-btn { padding: 0.5rem 0.9rem; font-size: 0.78rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo" onclick="window.location.reload()">
      <div class="logo-icon">📡</div>
      <span class="logo-text">VortexTV</span>
    </div>
    <div style="display:flex; align-items:center; gap:0.7rem;">
      <span class="live-pulse">LIVE</span>
      <span id="totalEvents" style="font-size:0.8rem; color:var(--text-secondary); font-weight:500;"></span>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-value" id="statLive">0</div><div class="stat-label">Live</div></div>
    <div class="stat-item"><div class="stat-value" id="statUpcoming">0</div><div class="stat-label">Soon</div></div>
    <div class="stat-item"><div class="stat-value" id="statEnded">0</div><div class="stat-label">Ended</div></div>
    <div class="stat-item"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="search-bar">
    <span style="font-size:1rem;">🔍</span>
    <input type="text" id="searchInput" placeholder="Search events, teams, sports..." autocomplete="off" autocorrect="off" autocapitalize="off">
  </div>

  <div class="category-bar" id="categoryBar">
    <button class="cat-btn active" data-cat="live">🔴 Live</button>
    <button class="cat-btn" data-cat="upcoming">🟡 Upcoming</button>
    <button class="cat-btn" data-cat="ended">⚫ Ended</button>
    <button class="cat-btn" data-cat="all">📋 All</button>
  </div>

  <div class="grid" id="eventsGrid">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="streamModal" role="dialog" aria-modal="true">
  <div class="modal-content" id="modalContent">
    <span class="drag-handle"></span>
    <div class="modal-header">
      <h3 id="modalEventTitle">Streams</h3>
      <button class="close-btn" id="closeModalBtn" aria-label="Close">✕</button>
    </div>
    <div id="modalStreamsList"></div>
    <div class="related-section" id="modalRelatedSection" style="display:none;">
      <div class="related-title">Related Events</div>
      <div class="related-links" id="modalRelated"></div>
    </div>
  </div>
</div>
    <script>
(function() {
  'use strict';
  const EVENTS_API   = "https://vortextv.modsdone.com/cricfy.php/events";
  const STREAMS_BASE = "https://vortextv.modsdone.com/cricfy.php/streams/";

  let allEvents = [];
  let currentCategory = "live";
  let searchQuery = "";

  const SPORT_ICONS = { 'Football':'⚽','Cricket':'🏏','Basketball':'🏀','Ice Hockey':'🏒','Boxing':'🥊','Tennis':'🎾','Baseball':'⚾','Rugby':'🏉','Golf':'⛳','Formula 1':'🏎️','MMA':'🥋','WWE':'🤼' };

  function parseTime(str) {
    if (!str) return null;
    try {
      let s = str.trim().replace(/\//g, '-').replace(' ', 'T').replace(/\s+([+-])/, '$1').replace(/([+-])(\d{2})(\d{2})$/, '$1$2:$3');
      if (!/[Z]$/.test(s) && !/[+-]\d{2}:\d{2}$/.test(s)) s += 'Z';
      const d = new Date(s);
      return isNaN(d.getTime()) ? null : d;
    } catch(e) { return null; }
  }

  function getEventStatus(startStr, endStr) {
    const now = new Date();
    const start = parseTime(startStr);
    const end = parseTime(endStr);
    if (!start || now < start) return 'upcoming';
    if (end && now > end) return 'ended';
    return 'live';
  }

  function formatDateTime(dateStr) {
    const d = parseTime(dateStr);
    if (!d) return '—';
    return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:true, timeZone:'UTC' }) + ' UTC';
  }

  function getCountdown(startStr) {
    const start = parseTime(startStr);
    if (!start) return '';
    const diff = start - new Date();
    if (diff <= 0) return 'Starting now';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    return h >= 24 ? `in ${Math.floor(h / 24)}d ${h % 24}h` : (h > 0 ? `in ${h}h ${m}m` : `in ${m}m`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function buildTeamImgWrap(flagUrl, teamName, fallbackEmoji) {
    const wrap = document.createElement('div');
    wrap.className = 'team-img-wrap';
    const fallback = document.createElement('span');
    fallback.className = 'img-fallback';
    fallback.textContent = fallbackEmoji || '🏳️';
    wrap.appendChild(fallback);
    if (flagUrl) {
      const img = document.createElement('img');
      img.alt = teamName || '';
      img.loading = 'lazy';
      img.addEventListener('error', () => wrap.classList.add('img-error'), { once: true });
      img.src = flagUrl;
      wrap.appendChild(img);
    } else { wrap.classList.add('img-error'); }
    return wrap;
  }

  async function openStreamModal(slug, eventTitle) {
    const modal = document.getElementById('streamModal');
    const titleEl = document.getElementById('modalEventTitle');
    const listEl = document.getElementById('modalStreamsList');
    titleEl.textContent = eventTitle || 'Streams';
    listEl.innerHTML = `<div style="text-align:center;padding:2rem;">Loading streams…</div>`;
    modal.classList.add('active');

    try {
      const res = await fetch(`${STREAMS_BASE}${slug}`);
      const json = await res.json();
      if (json.status !== 'ok' || !json.data.streamUrls.length) {
        listEl.innerHTML = `<div class="stream-section-title">No Streams</div>`;
        return;
      }

      listEl.innerHTML = `<div class="stream-section-title">Available Streams</div>` + json.data.streamUrls.map((s, idx) => {
        const isDRM = s.type === '7' && s.api && s.api.includes(':');
        const playUrl = isDRM 
          ? `https://superkings-drmplayer.pages.dev/?url=${encodeURIComponent(s.link)}&keys=${s.api}`
          : `https://offsideverse-ios.netlify.app/?url=${encodeURIComponent(s.link)}`;
        
        return `
          <div class="stream-item">
            <div class="stream-item-top">
              <div class="stream-info">
                <div class="stream-title">📺 ${s.title || 'Stream ' + (idx + 1)}</div>
              </div>
              <div class="stream-actions">
                <a href="${playUrl}" target="_blank" class="copy-btn">▶ Play Stream</a>
              </div>
            </div>
          </div>`;
      }).join('');
    } catch(err) { listEl.innerHTML = `<div>Error loading streams.</div>`; }
  }

  // ... [Keep your existing fetchEvents, filterEvents, and event listener code here] ...
  
  fetchEvents();
  setInterval(fetchEvents, 120000);
})();
</script>
