<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BigFoot Player</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css" crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js" crossorigin="anonymous"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    background:#000;
}

#wrap{
    position:absolute;
    inset:0;
    background:#000;
}

#video{
    width:100%;
    height:100%;
}

/* HIDE SHAKA SPINNER */

.shaka-spinner-container,
.shaka-buffering-spinner,
.shaka-spinner{
    display:none!important;
}

/* LOADER */

#loader{
    position:fixed;
    inset:0;
    background:#000;
    z-index:999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    transition:opacity .4s;
}

#loader.gone{
    opacity:0;
    pointer-events:none;
}

#ring{
    width:42px;
    height:42px;
    border:3px solid rgba(232,255,71,.12);
    border-top-color:#e8ff47;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

#llbl{
    font-size:11px;
    font-weight:800;
    letter-spacing:.12em;
    color:rgba(255,255,255,.25);
}

/* TELEGRAM WATERMARK */

#wm{
    position:fixed;
    top:12px;
    left:7px;
    z-index:900;
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(0,136,204,.18);
    backdrop-filter:blur(8px);
    border:1px solid rgba(0,136,204,.28);
    padding:6px 11px;
    border-radius:7px;
    color:#fff;
    font-size:12px;
    font-weight:700;
    text-decoration:none;
    transition:.2s;
}

#wm:hover{
    background:rgba(0,136,204,.32);
}

/* STATUS */

#status{
    position:fixed;
    left:12px;
    bottom:12px;
    z-index:1000;
    color:rgba(255,255,255,.9);
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.2);
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
    max-width:88vw;
}

#status:empty{
    display:none;
}

/* POPUP */

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    backdrop-filter:blur(6px);
    background:rgba(0,0,0,.4);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeIn .5s ease;
}

.modal.hidden{
    display:none!important;
}

.modal-content{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px 25px;
    width:90%;
    max-width:400px;
    text-align:center;
    color:#f3f4f6;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter:blur(12px);
    transform:scale(.95);
    animation:scaleIn .4s ease forwards;
}

.modal-content h2{
    font-size:24px;
    font-weight:700;
    color:#facc15;
    margin-bottom:16px;
}

.modal-content p{
    font-size:16px;
    color:#d1d5db;
    margin-bottom:24px;
    line-height:1.5;
}

.modal-content strong{
    color:#fff;
}

.modal-content .btn{
    width:100%;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:12px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.3s;
}

#joinButton{
    background:linear-gradient(to right,#3b82f6,#06b6d4);
    color:#fff;
    font-weight:500;
}

#joinButton:hover{
    background:linear-gradient(to right,#2563eb,#0891b2);
    transform:scale(1.02);
}

#closeButton{
    background:rgba(255,255,255,0.1);
    color:#f3f4f6;
}

#closeButton:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.02);
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes scaleIn{
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<a href="https://t.me/+l-BV45YWZoM3ZmE9" target="_blank" id="wm">
@Shrey7nsh FB
</a>

<div id="wrap" data-shaka-player-container>

    <video
        autoplay
        muted
        playsinline
        data-shaka-player
        id="video">
    </video>

</div>

<div id="loader">
    <div id="ring"></div>
    <div id="llbl">LOADING STREAM</div>
</div>

<div id="telegramModal" class="modal">

    <div class="modal-content">

        <h2>Join Our Telegram</h2>

        <p>
            Stay updated with the latest
            <strong>Live Match Links</strong>
            and updates. Click below to join our official Telegram channel.
        </p>

        <a href="https://t.me/+l-BV45YWZoM3ZmE9" target="_blank" style="text-decoration:none;">

            <button id="joinButton" class="btn">
                Join Telegram
            </button>

        </a>

        <button id="closeButton" class="btn">
            Maybe Later
        </button>

    </div>

</div>

<div id="status"></div>

<script>

function showStatus(text){

    const s = document.getElementById('status');

    if(s){
        s.textContent = text;
    }
}

function onPlayerError(error){

    const code = error && error.code ? error.code : 'UNKNOWN';

    console.error('Shaka Error', error);

    showStatus('Stream failed (' + code + ')');

    document.getElementById('llbl').textContent = 'STREAM FAILED';

    document.getElementById('loader').classList.remove('gone');
}

document.addEventListener('shaka-ui-loaded', initPlayer);

document.addEventListener('shaka-ui-load-failed', function(){

    showStatus('Unable to load Shaka UI');
});

async function initPlayer(){

    if(!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()){

        showStatus('Browser not supported');
        return;
    }

    shaka.polyfill.installAll();

    const video = document.getElementById('video');

    if(!video || !video.ui){

        setTimeout(initPlayer,80);
        return;
    }

    const ui = video.ui;

    const controls = ui.getControls();

    const player = controls.getPlayer();

    player.addEventListener('error', function(ev){

        onPlayerError(ev.detail);
    });

    controls.addEventListener('error', function(ev){

        onPlayerError(ev.detail);
    });

    ui.configure({
        controlPanelElements:[
            "play_pause",
            "mute",
            "volume",
            "spacer",
            "time_and_duration",
            "quality",
            "fullscreen",
            "overflow_menu"
        ]
    });

    player.configure({

        streaming:{
            bufferingGoal:20,
            rebufferingGoal:2,
            bufferBehind:20
        }
    });

    const params = new URLSearchParams(window.location.search);

    const id = params.get("id");

    if(!id){

        document.getElementById('llbl').textContent = "NO STREAM ID";

        showStatus('Missing stream id');

        return;
    }

    try{

        const res = await fetch(
            `https://footsters.playsportsapi.workers.dev/?id=${id}`
        );

        const data = await res.json();

        const stream = data[id];

        if(!stream){

            document.getElementById('llbl').textContent = "STREAM NOT FOUND";

            showStatus('Invalid stream');

            return;
        }

        player.configure({

            drm:{
                clearKeys:stream.keys
            }
        });

        await player.load(stream.url);

        if(stream.poster){

            video.poster = stream.poster;
        }

        showStatus('');

        document.getElementById('loader').classList.add('gone');

        video.muted = false;

        video.play().catch(function(){});

    }catch(e){

        onPlayerError(e);
    }
}

/* POPUP */

window.addEventListener("DOMContentLoaded", function(){

    document.getElementById("closeButton").onclick = function(){

        document.getElementById("telegramModal").classList.add("hidden");
    };
});

/* WAKE LOCK */

if('wakeLock' in navigator){

    navigator.wakeLock.request('screen').catch(function(){});
}

</script>

</body>
</html>
