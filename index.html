<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BigFoot Player</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css" crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js" crossorigin="anonymous"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}

#overlay{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#overlay svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#overlay p{color:#555;font-size:13px;letter-spacing:.4px;text-align:center;padding:0 20px}

#channel-list{position:fixed;inset:0;background:#0a0a0a;z-index:9998;display:none;flex-direction:column;overflow-y:auto;padding:24px 16px}
#channel-list h1{color:#fff;font-size:15px;font-weight:600;letter-spacing:.5px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #1e1e1e;text-align:center}
#ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.ch-card{background:#141414;border:1px solid #1e1e1e;border-radius:8px;padding:14px 10px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;text-align:center;transition:background .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.ch-card:hover{background:#1c1c1c;border-color:#333}
.ch-card:active{background:#222}
.ch-card span{color:#e0e0e0;font-size:12px;font-weight:500;line-height:1.4}

#pc{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;touch-action:manipulation}
video{width:100%;height:100%;object-fit:contain;background:#000}
video.mode-fill{object-fit:fill}
video.mode-cover{object-fit:cover}

#tap-gate{
  position:absolute;
  inset:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.52);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#tap-gate.hidden{display:none}
#tap-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  pointer-events:none;
}
#tap-btn{
  width:72px;height:72px;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  border:2.5px solid rgba(255,255,255,0.55);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  transition:transform .15s ease,background .15s ease;
}
#tap-gate:active #tap-btn{transform:scale(.92);background:rgba(255,255,255,0.22)}
#tap-btn svg{width:30px;height:30px;margin-left:4px}
#tap-label{
  color:rgba(255,255,255,0.75);
  font-size:12px;
  font-weight:500;
  letter-spacing:.5px;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}

#status{position:fixed;top:0;right:0;z-index:9997;padding:5px 10px;background:rgba(0,0,0,0.82);font-size:10px;letter-spacing:.04em;border-bottom-left-radius:6px;pointer-events:none;opacity:0;transition:opacity .4s ease;max-width:280px;text-align:right;line-height:1.5}
#status.show{opacity:1}
#status.ok{color:#38bdf8}
#status.warn{color:#fb923c}
#status.err{color:#f87171}

.shaka-fit-btn{background:transparent!important;border:none!important;cursor:pointer!important;padding:0 7px!important;opacity:.85;display:flex;align-items:center;justify-content:center;height:100%}
.shaka-fit-btn:hover{opacity:1}
.shaka-fit-btn svg{width:20px;height:20px;display:block}
</style>
</head>
<body>

<div id="overlay">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="16" stroke="#222" stroke-width="4"/>
    <path d="M20 4a16 16 0 0 1 16 16" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  </svg>
  <p id="loadMsg">Loading...</p>
</div>

<div id="status"></div>

<div id="channel-list">
  <h1>&#9654; Sports Live</h1>
  <div id="ch-grid"></div>
</div>

<div id="pc">
  <video id="v" autoplay muted playsinline webkit-playsinline preload="none"></video>

  <div id="tap-gate">
    <div id="tap-inner">
      <div id="tap-btn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4l14 8-14 8V4z" fill="rgba(255,255,255,0.95)"/>
        </svg>
      </div>
      <span id="tap-label">TAP TO WATCH LIVE</span>
    </div>
  </div>
</div>

<script>

function showStatus(text){

    const s = document.getElementById('status');

    if(s){
        s.textContent = text;
    }
}

function onPlayerError(error){

    const code = error && error.code ? error.code : 'UNKNOWN';

    console.error('Shaka Error', error);

    showStatus('Stream failed (' + code + ')');

    document.getElementById('llbl').textContent = 'STREAM FAILED';

    document.getElementById('loader').classList.remove('gone');
}

document.addEventListener('shaka-ui-loaded', initPlayer);

document.addEventListener('shaka-ui-load-failed', function(){

    showStatus('Unable to load Shaka UI');
});

async function initPlayer(){

    if(!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()){

        showStatus('Browser not supported');
        return;
    }

    shaka.polyfill.installAll();

    const video = document.getElementById('video');

    if(!video || !video.ui){

        setTimeout(initPlayer,80);
        return;
    }

    const ui = video.ui;

    const controls = ui.getControls();

    const player = controls.getPlayer();

    player.addEventListener('error', function(ev){

        onPlayerError(ev.detail);
    });

    controls.addEventListener('error', function(ev){

        onPlayerError(ev.detail);
    });

    ui.configure({
        controlPanelElements:[
            "play_pause",
            "mute",
            "volume",
            "spacer",
            "time_and_duration",
            "quality",
            "fullscreen",
            "overflow_menu"
        ]
    });

    player.configure({

        streaming:{
            bufferingGoal:20,
            rebufferingGoal:2,
            bufferBehind:20
        }
    });

    const params = new URLSearchParams(window.location.search);

    const id = params.get("id");

    if(!id){

        document.getElementById('llbl').textContent = "NO STREAM ID";

        showStatus('Missing stream id');

        return;
    }

    try{

        const res = await fetch(
            `https://footsters.playsportsapi.workers.dev/?id=${id}`
        );

        const data = await res.json();

        const stream = data[id];

        if(!stream){

            document.getElementById('llbl').textContent = "STREAM NOT FOUND";

            showStatus('Invalid stream');

            return;
        }

        player.configure({

            drm:{
                clearKeys:stream.keys
            }
        });

        await player.load(stream.url);

        if(stream.poster){

            video.poster = stream.poster;
        }

        showStatus('');

        document.getElementById('loader').classList.add('gone');

        video.muted = false;

        video.play().catch(function(){});

    }catch(e){

        onPlayerError(e);
    }
}

/* POPUP */

window.addEventListener("DOMContentLoaded", function(){

    document.getElementById("closeButton").onclick = function(){

        document.getElementById("telegramModal").classList.add("hidden");
    };
});

/* WAKE LOCK */

if('wakeLock' in navigator){

    navigator.wakeLock.request('screen').catch(function(){});
}

</script>

</body>
</html>
