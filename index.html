<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>M3U8 Player</title>

<!-- JW Player -->
<script src="https://content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#jwplayerDiv{
    width:100%;
    height:100%;
}

.jwplayer{
    position:absolute !important;
    inset:0;
}

.jwplayer.jw-flag-aspect-mode{
    min-height:100%;
    max-height:100%;
}

/* Capture Preview */

#capture-preview{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(.9);
    background:linear-gradient(135deg,#1e1e1e,#2d2d2d);
    padding:28px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.8);
    z-index:9999;
    display:none;
    max-width:85%;
    max-height:85%;
    border:1px solid rgba(255,255,255,.08);
    animation:popup .3s ease forwards;
}

@keyframes popup{
    to{
        transform:translate(-50%,-50%) scale(1);
        opacity:1;
    }
}

#capture-preview.show{
    display:block;
    opacity:0;
}

.preview-header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:18px;
    color:#4CAF50;
    font-family:Arial,sans-serif;
    font-size:16px;
    font-weight:700;
}

#capture-preview img{
    width:100%;
    max-height:65vh;
    object-fit:contain;
    border-radius:12px;
    display:block;
}

.info{
    color:#999;
    text-align:center;
    margin-top:14px;
    font-family:Arial,sans-serif;
    font-size:13px;
}

.jw-svg-icon-capture{
    width:20px;
    height:20px;
    fill:#fff;
}

</style>

</head>

<body>

<div id="jwplayerDiv"></div>

<!-- Capture Preview -->
<div id="capture-preview">

    <div class="preview-header">
        ✔ Frame Captured Successfully
    </div>

    <img id="captured-image" alt="Captured Frame">

    <div class="info">
        Image downloaded automatically
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const streamId  = params.get("id");
const directUrl = params.get("url");

async function startPlayer(){

    try{

        let stream = directUrl;

        // If using ?id=
        if(streamId){

            // Fetch JS file
            const response = await fetch(
                "https://lchdxfootball.pages.dev/premium.js"
            );

            // Get JS text
            const jsText = await response.text();

            // Remove variable declaration
            const objectText = jsText
                .replace("const streamMap =", "")
                .trim()
                .replace(/;$/, "");

            // Convert to object
            const data = eval("(" + objectText + ")");

            // Get stream
            if(
                data[streamId] &&
                data[streamId].url
            ){

                stream = data[streamId].url;

            }else{

                alert("Invalid Stream ID");
                return;
            }
        }

        // Default fallback
        if(!stream){

            stream =
            "https://rumble.com/live-hls-dvr/6z66p4/playlist.m3u8";
        }

        // Setup player
        const player = jwplayer("jwplayerDiv");

        player.setup({

            file: stream,

            type: "hls",

            width: "100%",
            height: "100%",

            autostart: true,

            stretching: "uniform",

            controls: true,

            preload: "auto",

            primary: "html5"

        });

        // Ready event
        player.on("ready", function(){

            const icon = `
            <svg xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 24 24"
                 class="jw-svg-icon jw-svg-icon-capture">

                <path fill="currentColor"
                d="M21 19V5c0-1.1-.9-2-2-2H5
                c-1.1 0-2 .9-2 2v14
                c0 1.1.9 2 2 2h14
                c1.1 0 2-.9 2-2zM8.5 13.5
                l2.5 3.01L14.5 12l4.5 6H5
                l3.5-4.5z"/>
            </svg>
            `;

            player.addButton(
                icon,
                "Capture Frame",
                captureFrame,
                "capture-frame-btn"
            );

        });

    }catch(error){

        console.error(error);

        alert("Failed To Load Stream");
    }
}

startPlayer();

function captureFrame(){

    try{

        const video = document.querySelector("video");

        if(!video){

            alert("Video Not Found");
            return;
        }

        const canvas = document.createElement("canvas");

        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");

        ctx.drawImage(
            video,
            0,
            0,
            canvas.width,
            canvas.height
        );

        canvas.toBlob(function(blob){

            const imageUrl =
            URL.createObjectURL(blob);

            // Download image
            const a =
            document.createElement("a");

            const timestamp =
            new Date()
            .toISOString()
            .replace(/[:.]/g,"-");

            a.href = imageUrl;

            a.download =
            `frame-${timestamp}.png`;

            a.click();

            // Show preview
            const preview =
            document.getElementById(
                "capture-preview"
            );

            const img =
            document.getElementById(
                "captured-image"
            );

            img.src = imageUrl;

            preview.classList.add("show");

            setTimeout(()=>{

                preview.classList.remove(
                    "show"
                );

                URL.revokeObjectURL(
                    imageUrl
                );

            },2500);

        },"image/png");

    }catch(error){

        console.error(error);

        alert("Capture Failed");
    }
}

</script>

</body>
</html>
