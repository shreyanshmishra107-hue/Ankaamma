<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="no-referrer">
<title>BigFoot Player</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; height:100%; background:#0a0a0a; overflow:hidden;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-user-select:none; user-select:none;
}

#overlay {
    position:fixed; inset:0; background:#0a0a0a; z-index:9999;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
#overlay svg { animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#overlay p { color:#555; font-size:13px; letter-spacing:.4px; }

#pc {
    position:fixed; inset:0; background:#000; display:none;
    align-items:center; justify-content:center; touch-action:manipulation;
}
video {
    width:100%; height:100%; object-fit:contain; background:#000;
}
video.mode-fill { object-fit:fill; }
video.mode-cover { object-fit:cover; }

#tap-gate {
    position:absolute; inset:0; z-index:100; display:flex;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.52); cursor:pointer;
}
#tap-gate.hidden { display:none; }
#tap-inner { display:flex; flex-direction:column; align-items:center; gap:14px; pointer-events:none; }
#tap-btn {
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,255,255,0.12); border:2.5px solid rgba(255,255,255,0.55);
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px); transition:transform .15s ease, background .15s ease;
}
#tap-gate:active #tap-btn { transform:scale(.92); background:rgba(255,255,255,0.22); }
#tap-btn svg { width:30px; height:30px; margin-left:4px; }
#tap-label {
    color:rgba(255,255,255,0.75); font-size:12px; font-weight:500;
    letter-spacing:.5px; text-shadow:0 1px 4px rgba(0,0,0,.6);
}

#status {
    position:fixed; top:0; right:0; z-index:9997; padding:5px 10px;
    background:rgba(0,0,0,0.82); font-size:10px; letter-spacing:.04em;
    border-bottom-left-radius:6px; pointer-events:none; opacity:0;
    transition:opacity .4s ease; max-width:280px; text-align:right; line-height:1.5;
}
#status.show { opacity:1; }
#status.ok { color:#38bdf8; }
#status.warn { color:#fb923c; }
#status.err { color:#f87171; }

.shaka-fit-btn {
    background:transparent!important; border:none!important;
    cursor:pointer!important; padding:0 7px!important; opacity:.85;
    display:flex; align-items:center; justify-content:center; height:100%;
}
.shaka-fit-btn:hover { opacity:1; }
.shaka-fit-btn svg { width:20px; height:20px; display:block; }

/* Telegram Popup */
.modal {
    position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
    display:flex; justify-content:center; align-items:center; z-index:9999;
}
.modal.hidden { display:none; }
.modal-content {
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:20px; padding:30px 25px; width:90%; max-width:400px;
    text-align:center; color:#f3f4f6; box-shadow:0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter:blur(12px);
}
.modal-content h2 { font-size:24px; font-weight:700; color:#facc15; margin-bottom:16px; }
.modal-content p { font-size:16px; color:#d1d5db; margin-bottom:24px; line-height:1.5; }
.modal-content .btn {
    width:100%; padding:12px; font-size:16px; border:none; border-radius:12px;
    margin-bottom:12px; cursor:pointer; transition:.3s;
}
#joinButton { background:linear-gradient(to right,#3b82f6,#06b6d4); color:#fff; font-weight:500; }
#closeButton { background:rgba(255,255,255,0.1); color:#f3f4f6; }
</style>
</head>
<body>

<div id="overlay">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="16" stroke="#222" stroke-width="4"/>
    <path d="M20 4a16 16 0 0 1 16 16" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  </svg>
  <p id="loadMsg">Loading Stream...</p>
</div>

<div id="status"></div>

<div id="pc">
  <video id="v" autoplay muted playsinline preload="none"></video>
  
  <div id="tap-gate">
    <div id="tap-inner">
      <div id="tap-btn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4l14 8-14 8V4z" fill="rgba(255,255,255,0.95)"/>
        </svg>
      </div>
      <span id="tap-label">TAP TO WATCH LIVE</span>
    </div>
  </div>
</div>

<!-- Telegram Popup -->
<div id="telegramModal" class="modal">
  <div class="modal-content">
    <h2>Join Our Telegram</h2>
    <p>Stay updated with the latest <strong>Live Match Links</strong> and updates.Click below to join our official Telegram channel.

</p>
    <a href="https://t.me/+l-BV45YWZoM3ZmE9" target="_blank" style="text-decoration:none;">
      <button id="joinButton" class="btn">Join Telegram</button>
    </a>
    <button id="closeButton" class="btn">Maybe Later</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<script>
(async function () {
    "use strict";

    const overlay = document.getElementById("overlay");
    const loadMsg = document.getElementById("loadMsg");
    const statusEl = document.getElementById("status");
    const pc = document.getElementById("pc");
    const video = document.getElementById("v");
    const tapGate = document.getElementById("tap-gate");

    let stTimer = null;

    function showStatus(msg, type = "ok", duration = 4000) {
        statusEl.textContent = msg;
        statusEl.className = `show ${type}`;
        if (stTimer) clearTimeout(stTimer);
        if (duration !== 0) {
            stTimer = setTimeout(() => statusEl.classList.remove("show"), duration);
        }
    }

    function setLoadMsg(msg) {
        loadMsg.textContent = msg;
    }

    // Fit Modes Button
    function injectFitButton(container, vid) {
        const panel = container.querySelector(".shaka-controls-button-panel");
        if (!panel) return;
        let modeIdx = 0;
        const btn = document.createElement("button");
        btn.className = "shaka-fit-btn";
        btn.title = "Toggle Fit Mode";
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="1" stroke="rgba(255,255,255,0.9)" stroke-width="1.6"/><rect x="6" y="9" width="12" height="6" rx=".5" fill="rgba(255,255,255,0.22)"/></svg>';
        
        const anchor = panel.querySelector(".shaka-fullscreen-button");
        if (anchor) panel.insertBefore(btn, anchor);
        else panel.appendChild(btn);

        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            modeIdx = (modeIdx + 1) % 3;
            const modes = ["contain", "fill", "cover"];
            const m = modes[modeIdx];
            vid.classList.remove("mode-fill", "mode-cover");
            if (m === "fill") vid.classList.add("mode-fill");
            if (m === "cover") vid.classList.add("mode-cover");
            
            // Update icon (simple rotation)
            btn.innerHTML = m === "contain" ? 
                '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="1" stroke="rgba(255,255,255,0.9)" stroke-width="1.6"/><rect x="6" y="9" width="12" height="6" rx=".5" fill="rgba(255,255,255,0.22)"/></svg>' :
                m === "fill" ?
                '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="1" stroke="rgba(255,255,255,0.9)" stroke-width="1.6"/></svg>' :
                '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="1" stroke="rgba(255,255,255,0.9)" stroke-width="1.6"/><path d="M3 3l4 4M21 3l-4 4M3 21l4-4M21 21l-4-4" stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/></svg>';
        });
    }

    async function startPlayer() {
        const params = new URLSearchParams(location.search);
        const id = params.get("id");

        if (!id) {
            setLoadMsg("No Stream ID");
            showStatus("Missing ?id= parameter", "err", 0);
            return;
        }

        pc.style.display = "flex";

        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            showStatus("Browser not supported", "err", 0);
            return;
        }

        const player = new shaka.Player();
        await player.attach(video);

        const ui = new shaka.ui.Overlay(player, pc, video);
        ui.configure({
            controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "picture_in_picture", "fullscreen"],
            seekBarColors: { base: "rgba(255,255,255,0.2)", buffered: "rgba(56,189,248,0.5)", played: "#38bdf8" }
        });

        setTimeout(() => injectFitButton(pc, video), 100);

        try {
            setLoadMsg("Fetching Stream...");
            showStatus("Loading stream...", "warn", 0);

            const res = await fetch(`https://footsters.playsportsapi.workers.dev/?id=${id}`);
            const data = await res.json();
            const stream = data[id];

            if (!stream || !stream.url) throw new Error("Stream not found");

            player.configure({
                drm: { clearKeys: stream.keys || {} },
                manifest: { defaultPresentationDelay: 6 },
                streaming: { bufferingGoal: 8, rebufferingGoal: 3 }
            });

            await player.load(stream.url);
            video.muted = true;
            await video.play().catch(() => {});

            overlay.style.display = "none";
            tapGate.classList.remove("hidden");
            showStatus("Live ●", "ok", 4000);

        } catch (e) {
            console.error(e);
            showStatus("Failed to Load Stream", "err", 0);
            setLoadMsg("Playback Failed");
        }

        // Tap Gate
        tapGate.addEventListener("click", () => {
            tapGate.classList.add("hidden");
            video.muted = false;
            video.play().catch(() => {});
        }, { once: true });
    }

    // Popup Handler
    document.getElementById("closeButton").onclick = () => {
        document.getElementById("telegramModal").classList.add("hidden");
    };

    // Start Everything
    document.addEventListener("DOMContentLoaded", startPlayer);

})();
</script>
</body>
</html>
