<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VortexTV • Player Optimized</title>
  <style>
    :root { --bg-deep: #060a14; --bg-card: rgba(16, 22, 38, 0.65); --accent-blue: #3b82f6; --text-primary: #f8fafc; }
    body { background: var(--bg-deep); font-family: sans-serif; color: var(--text-primary); margin: 0; padding: 20px; }
    .card { background: var(--bg-card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .stream-item { background: rgba(30,41,59,0.5); padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .play-btn { background: var(--accent-blue); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

<div id="eventsGrid" class="container"></div>

<div id="streamModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); padding:20px;">
  <button onclick="document.getElementById('streamModal').style.display='none'">Close</button>
  <h2 id="modalEventTitle">Streams</h2>
  <div id="modalStreamsList"></div>
</div>

<script>
(function() {
  const EVENTS_API = "https://vortextv.modsdone.com/cricfy.php/events";
  const STREAMS_BASE = "https://vortextv.modsdone.com/cricfy.php/streams/";

  async function fetchEvents() {
    const res = await fetch(EVENTS_API);
    const json = await res.json();
    const grid = document.getElementById('eventsGrid');
    grid.innerHTML = json.data.map(ev => `
      <div class="card" onclick="openStreamModal('${ev.slug}', '${ev.title}')">
        <h3>${ev.title}</h3>
      </div>`).join('');
  }

  window.openStreamModal = async function(slug, title) {
    const modal = document.getElementById('streamModal');
    const list = document.getElementById('modalStreamsList');
    modal.style.display = 'block';
    list.innerHTML = 'Loading...';

    const res = await fetch(`${STREAMS_BASE}${slug}`);
    const json = await res.json();

    list.innerHTML = json.data.streamUrls.map(s => {
      // Logic for your specific players
      const isDRM = s.type === '7' && s.api && s.api.includes(':');
      const playerUrl = isDRM 
        ? `https://superkings-drmplayer.pages.dev/?url=${encodeURIComponent(s.link)}&keys=${s.api}` 
        : `https://offsideverse-ios.netlify.app/?url=${encodeURIComponent(s.link)}`;

      return `
        <div class="stream-item">
          <span>${s.title}</span>
          <a href="${playerUrl}" target="_blank" class="play-btn">▶ Play Stream</a>
        </div>`;
    }).join('');
  };

  fetchEvents();
})();
</script>
</body>
</html>
